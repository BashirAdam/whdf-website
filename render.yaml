services:
  - type: web
    name: whdf-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: shield_foundation
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://whdf-frontend.onrender.com

  - type: web
    name: whdf-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html